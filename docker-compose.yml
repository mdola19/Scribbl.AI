# Full stack: Next.js + Ollama on the Docker network.
# Local dev: open http://localhost:3000 — pull the vision model once (see README or scripts/local-up.sh).
# Production: do not publish Ollama to the public internet without auth (see README).

services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 40s

  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.2-vision
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
